<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OG Image Preview — Gregory Guimaraes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a1a; }
  .og-card {
    width: 1200px;
    height: 630px;
    background: #0A0A0B;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .og-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(16,185,129,0.12), transparent),
      radial-gradient(ellipse 50% 40% at 80% 70%, rgba(6,182,212,0.08), transparent);
  }
  .grid-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .content { position: relative; z-index: 1; text-align: center; }
  .logo {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #10B981, rgba(110,231,183,0.3));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 32px;
    border: 2px solid rgba(16,185,129,0.3);
  }
  .logo span {
    font-size: 32px;
    font-weight: 300;
    color: #0A0A0B;
    letter-spacing: -1px;
  }
  .name {
    font-size: 64px;
    font-weight: 300;
    color: #F5F5F5;
    letter-spacing: -2px;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 22px;
    color: #10B981;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 40px;
  }
  .tags {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 48px;
  }
  .tag {
    font-size: 13px;
    color: rgba(245,245,245,0.5);
    padding: 6px 16px;
    border: 1px solid rgba(245,245,245,0.1);
    border-radius: 4px;
    letter-spacing: 1px;
  }
  .url {
    position: absolute;
    bottom: 32px;
    left: 0; right: 0;
    text-align: center;
    font-size: 16px;
    color: rgba(245,245,245,0.3);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="og-card">
  <div class="grid-overlay"></div>
  <div class="content">
    <div class="logo"><span>GG</span></div>
    <div class="name">Gregory Guimaraes</div>
    <div class="subtitle">AI Solutions Architect</div>
    <div class="tags">
      <span class="tag">DDD</span>
      <span class="tag">AI/ML</span>
      <span class="tag">React</span>
      <span class="tag">TypeScript</span>
      <span class="tag">System Design</span>
    </div>
  </div>
  <div class="url">gregorypinto.dev</div>
</div>
<p style="color:#888; margin-top:24px; font-family:sans-serif; font-size:14px;">
  Screenshot this card at 1200x630 and save as <code>public/og-image.png</code>
</p>
</body>
</html>
